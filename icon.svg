<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="6" fill="#1a1a2e"/>
  <!-- Horizontal guide line -->
  <line x1="6" y1="24" x2="42" y2="24" stroke="#ff6b6b" stroke-width="1.5"/>
  <!-- Vertical guide line -->
  <line x1="24" y1="6" x2="24" y2="42" stroke="#6bffb8" stroke-width="1.5"/>
  <!-- Top ruler hint -->
  <rect x="6" y="4" width="36" height="6" rx="1" fill="#2a2a4a" opacity="0.8"/>
  <!-- Left ruler hint -->
  <rect x="4" y="6" width="6" height="36" rx="1" fill="#2a2a4a" opacity="0.8"/>
  <!-- Tick marks on top ruler -->
  <line x1="24" y1="7" x2="24" y2="10" stroke="#888" stroke-width="1"/>
  <line x1="16" y1="8" x2="16" y2="10" stroke="#666" stroke-width="1"/>
  <line x1="32" y1="8" x2="32" y2="10" stroke="#666" stroke-width="1"/>
  <!-- Tick marks on left ruler -->
  <line x1="7" y1="24" x2="10" y2="24" stroke="#888" stroke-width="1"/>
  <line x1="8" y1="16" x2="10" y2="16" stroke="#666" stroke-width="1"/>
  <line x1="8" y1="32" x2="10" y2="32" stroke="#666" stroke-width="1"/>
</svg>
